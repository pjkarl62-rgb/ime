<!DOCTYPE html>
<html lang="de">
<body>
    <button id="micBtn">Mikrofon aktivieren</button>
    <p id="debug">Status: Bereit</p>

    <script>
        const btn = document.getElementById('micBtn');
        const debug = document.getElementById('debug');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();

        recognition.lang = 'de-DE';
        recognition.continuous = false;
        recognition.interimResults = false;

        btn.onclick = () => {
            debug.innerText = "Status: Starte...";
            try {
                recognition.start();
            } catch (e) {
                debug.innerText = "Error: " + e.message;
            }
        };

        // Das hier ist der wichtigste Teil für dein Debugging
        recognition.onstart = () => { debug.innerText = "Status: Höre zu..."; };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            debug.innerText = "Erfolg: " + transcript;
            window.parent.postMessage({ type: 'transcript', text: transcript }, "*");
        };

        recognition.onerror = (event) => {
            debug.innerText = "Fehler: " + event.error;
        };
    </script>
</body>
</html>‚
