<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>IME Interface</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: transparent;
            font-family: sans-serif;
        }
        #micBtn {
            padding: 20px 40px;
            font-size: 20px;
            font-weight: bold;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
        }
        #micBtn:active { transform: scale(0.95); background-color: #0056b3; }
        #micBtn:disabled { background-color: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <button id="micBtn">IME aktivieren</button>

    <script>
        const btn = document.getElementById('micBtn');
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            btn.innerText = "Nicht unterstützt";
            btn.disabled = true;
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = 'de-DE';
            recognition.continuous = false;

            btn.onclick = async () => {
                            // Prüfe, ob AudioContext überhaupt erlaubt ist
                            try {
                                const AudioContext = window.AudioContext || window.webkitAudioContext;
                                if (AudioContext) {
                                    const audioCtx = new AudioContext();
                                    if (audioCtx.state === 'suspended') {
                                        await audioCtx.resume();
                                    }
                                }
                            } catch (e) {
                                console.warn("AudioContext blockiert, fahre fort...");
                            }

                            btn.innerText = "Höre zu...";
                            try {
                                recognition.start();
                            } catch (err) {
                                console.error("Erkennungs-Fehler:", err);
                                btn.innerText = "Mikrofon blockiert!";
                            }
                        };
                        
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript.toLowerCase();
                btn.innerText = "Verarbeite...";

                // Intent-Erkennung
                let command = 'chat';
                if (transcript.includes('ime')) command = 'start_ime';
                else if (transcript.includes('setup')) command = 'go_setup';
                else if (transcript.includes('kalender') || transcript.includes('online call')) command = 'go_calendar';

                // Nachricht an Wix senden
                window.parent.postMessage({ type: command, text: transcript }, "*");

                setTimeout(() => { btn.innerText = "IME aktivieren"; }, 2000);
            };

            recognition.onerror = (e) => {
                console.error("Spracherkennung Fehler:", e.error);
                btn.innerText = "Fehler - Neu versuchen";
            };
        }

        // Sprachausgabe empfangen
        window.onmessage = (event) => {
            if (event.data && event.data.type === 'speak') {
                // Alte Sprachausgaben stoppen, um Überschneidungen zu vermeiden
                window.speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(event.data.text);
                utterance.lang = 'de-DE';
                window.speechSynthesis.speak(utterance);
            }
        };
    </script>
</body>
</html>
