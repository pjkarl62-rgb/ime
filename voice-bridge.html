<!DOCTYPE html>
<html>
<body>
    <button id="startBtn" style="padding:20px; font-size:20px;">IME aktivieren</button>
    <p id="status"></p>

    <script>
        const btn = document.getElementById('startBtn');
        const status = document.getElementById('status');

        btn.onclick = () => {
            btn.style.display = 'none';
            status.innerText = "Aktiviere Spracherkennung...";
            startRecognition();
        };

        function startRecognition() {
            // Browser-Kompatibilität prüfen
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

            if (!SpeechRecognition) {
                status.innerText = "FEHLER: Dein Browser unterstützt keine Spracherkennung (nutze Chrome).";
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.lang = 'de-DE';

            recognition.onstart = () => { status.innerText = "IME lauscht..."; };

            recognition.onerror = (event) => {
                status.innerText = "FEHLER: " + event.error;
                console.error("Spracherkennungsfehler:", event.error);
            };

            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
                status.innerText = "Gehört: " + text;
                console.log("Gehört:", text);

                if (text.includes("setup ime")) {
                    window.parent.postMessage({ type: 'openSection', section: '#sectionIME' }, "*");
                } else if (text.includes("kalender")) {
                    window.parent.postMessage({ type: 'openSection', section: '#sectionCALENDER' }, "*");
                } else if (text.includes("ime")) {
                    window.parent.postMessage({ type: 'processVoice', transcript: text.split("ime")[1].trim() }, "*");
                }
            };

            recognition.start();
        }
    </script>
</body>
</html>‚
