<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>IME Voice Bridge</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: transparent;
            font-family: sans-serif;
        }
        #startBtn {
            padding: 20px 40px;
            font-size: 18px;
            cursor: pointer;
            background: #007bff;
            color: #fff;
            border: none;
            border-radius: 50px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <button id="startBtn">IME aktivieren</button>

    <script>
        const btn = document.getElementById('startBtn');

        btn.onclick = () => {
            btn.style.display = 'none';
            startRecognition();
        };

        function startRecognition() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) {
                alert("Dein Browser unterstützt keine Spracherkennung.");
                return;
            }

            const recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.lang = 'de-DE';

            recognition.onresult = (event) => {
                const text = event.results[event.results.length - 1][0].transcript.toLowerCase();
                console.log("Gehört:", text);

                if (text.includes("setup ime")) {
                    window.parent.postMessage({ type: 'openSection', section: '#sectionIME' }, "*");
                } else if (text.includes("kalender") || text.includes("termin")) {
                    window.parent.postMessage({ type: 'openSection', section: '#sectionCALENDER' }, "*");
                } else if (text.includes("ime")) {
                    const command = text.split("ime")[1].trim();
                    window.parent.postMessage({ type: 'processVoice', transcript: command }, "*");
                }
            };

            recognition.start();
            recognition.onend = () => recognition.start();
        }

        window.addEventListener("message", (event) => {
            if (event.data.type === 'play') {
                const utterance = new SpeechSynthesisUtterance(event.data.text);
                utterance.lang = 'de-DE';
                window.speechSynthesis.speak(utterance);
            }
        });
    </script>
</body>
</html>
