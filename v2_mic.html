<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>IME MIC</title>
</head>

<body>

<button onclick="startRecording()">
START RECORDING
</button>

<button onclick="stopRecording()">
STOP RECORDING
</button>

<script>

let mediaRecorder;
let audioChunks = [];

async function startRecording() {

    try {

        console.log("MIC START");

        const stream =
            await navigator.mediaDevices.getUserMedia({
                audio: true
            });

        console.log(
            "MIC PERMISSION GRANTED"
        );

        mediaRecorder =
            new MediaRecorder(stream);

        console.log(
            "MEDIA RECORDER CREATED"
        );

        audioChunks = [];

        mediaRecorder.ondataavailable =
            event => {
                audioChunks.push(event.data);
            };

        mediaRecorder.start();

        console.log(
            "RECORDER STATE:",
            mediaRecorder.state
        );

        console.log(
            "RECORDING..."
        );

    }
    catch(error) {

        console.error(
            "MIC ERROR:",
            error
        );

    }

}

async function stopRecording() {

    console.log(
        "STOP RECORDING"
    );

    console.log(
        "RECORDER OBJECT:",
        mediaRecorder
    );

    if(
        !mediaRecorder
    ) {

        console.log(
            "RECORDER IS NULL"
        );

        return;
    }

    console.log(
        "STATE:",
        mediaRecorder.state
    );

    mediaRecorder.onstop =
        async () => {

            console.log(
                "RECORDER STOPPED"
            );

            const audioBlob =
                new Blob(
                    audioChunks,
                    {
                        type: "audio/webm"
                    }
                );

            console.log(
                "AUDIO SIZE:",
                audioBlob.size
            );

            const formData =
                new FormData();

            formData.append(
                "audio",
                audioBlob,
                "ime_audio.webm"
            );

            const response =
                await fetch(
                    "https://www.visions-real.com/_functions/v2_voice_upload",
                    {
                        method: "POST",
                        body: formData
                    }
                );

            const result =
                await response.json();

            console.log(
                result
            );

        };

    mediaRecorder.stop();

}

</script>

</body>
</html>
