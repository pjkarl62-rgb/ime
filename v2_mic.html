<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>IME MIC</title>
</head>

<body>

<h2>IME microphone test</h2>

<button onclick="wake()">
HELLO IME
</button>

<button onclick="sendText()">
IME ASK JEFF TESLA NEWS
</button>

<button onclick="sleep()">
SLEEP
</button>

<script>

function wake() {

    if(window.opener) {

        window.opener.postMessage(
        {
            type: "IME_WAKE"
        }, "*");

    }
}

function sendText() {

    if(window.opener) {

        window.opener.postMessage(
        {
            type: "IME_TEXT",
            text: "IME ASK JEFF TESLA NEWS"
        }, "*");

    }
}

function sleep() {

    if(window.opener) {

        window.opener.postMessage(
        {
            type: "IME_SLEEP"
        }, "*");

    }
}

</script>

</body>
</html>
