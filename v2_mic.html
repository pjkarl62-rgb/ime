<!DOCTYPE html>

<html>

<head>

<meta charset="UTF-8">

<title>IME Awakening</title>

<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;

}

#background{

    position:absolute;

    width:100%;
    height:100%;

    overflow:hidden;

}

.star{

    position:absolute;

    width:4px;
    height:4px;

    border-radius:50%;

    opacity:.2;

    animation:
        twinkle
        5s
        infinite
        ease-in-out;

}

@keyframes twinkle{

    0%{
        opacity:.15;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.15;
    }

}

#core{

    position:relative;

    width:220px;
    height:220px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    transition:
        all
        .4s
        ease;

    animation:
        breathe
        3s
        infinite
        ease-in-out;

}

@keyframes breathe{

    0%{

        transform:
            scale(1);

    }

    50%{

        transform:
            scale(1.06);

    }

    100%{

        transform:
            scale(1);

    }

}

#logo{

    width:170px;
    height:170px;

    border-radius:50%;

    object-fit:cover;

}

.node{

    position:absolute;

    width:16px;
    height:16px;

    border-radius:50%;

    opacity:.15;

    transition:
        all
        .6s
        ease;

}

.active{

    opacity:1;

    transform:
        scale(2);

}

#status{

    position:absolute;

    bottom:10%;

    width:100%;

    text-align:center;

    font-size:20px;

    letter-spacing:2px;

}

</style>

</head>

<body>

<div id="background"></div>

<div class="node" id="n1" style="top:20%;left:50%;"></div>
<div class="node" id="n2" style="top:35%;left:75%;"></div>
<div class="node" id="n3" style="top:65%;left:75%;"></div>
<div class="node" id="n4" style="top:80%;left:50%;"></div>
<div class="node" id="n5" style="top:65%;left:25%;"></div>
<div class="node" id="n6" style="top:35%;left:25%;"></div>

<div id="core">

```
<img
    id="logo"
>
```

</div>

<div id="status">

```
Touch to awaken companion
```

</div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const backgroundColor =
    params.get(
        "bg"
    ) || "#000000";

const dotsColor =
    params.get(
        "dots"
    ) || "#7dff7d";

const brandingLogo =
    params.get(
        "logo"
    );

const companionName =
    params.get(
        "name"
    ) || "IME";

const returnUrl =
    params.get(
        "returnUrl"
    );

document.body.style.background =
    backgroundColor;

document.getElementById(
    "status"
).style.color =
    dotsColor;

document.getElementById(
    "logo"
).src =
    brandingLogo;

document.querySelectorAll(
    ".node"
).forEach(node=>{

    node.style.background =
        dotsColor;

});

document.getElementById(
    "core"
).style.border =
    "2px solid " + dotsColor;

document.getElementById(
    "core"
).style.boxShadow =

    "0 0 30px " +
    dotsColor +
    "55";

for(let i=0;i<120;i++){

    const star =
        document.createElement(
            "div"
        );

    star.className =
        "star";

    star.style.left =
        Math.random()*100+"%";

    star.style.top =
        Math.random()*100+"%";

    star.style.background =
        dotsColor;

    star.style.animationDelay =
        Math.random()*5+"s";

    document.getElementById(
        "background"
    )
    .appendChild(
        star
    );

}

document.getElementById(
    "core"
)
.addEventListener(

    "click",

    async ()=>{

        try{

            document.getElementById(
                "status"
            ).innerHTML =

                "Requesting microphone access";

            await navigator
                .mediaDevices
                .getUserMedia({

                    audio:true

                });

            await activate(
                "n1",
                "Microphone online"
            );

            await activate(
                "n2",
                "Audio stream online"
            );

            await activate(
                "n3",
                "Backend online"
            );

            await activate(
                "n4",
                "Speech recognition online"
            );

            await activate(
                "n5",
                companionName +
                " online"
            );

            await activate(
                "n6",
                "Returning to companion"
            );

            await sleep(
                1500
            );

            window.location.href =
                decodeURIComponent(
                    returnUrl
                );

        }
        catch(error){

            document.getElementById(
                "status"
            ).innerHTML =

                "Microphone permission denied";

            console.log(
                error
            );

        }

    }

);

async function activate(
    id,
    text
){

    document.getElementById(
        id
    )
    .classList.add(
        "active"
    );

    document.getElementById(
        "status"
    ).innerHTML =
        text;

    await sleep(
        700
    );

}

function sleep(ms){

    return new Promise(

        resolve=>
            setTimeout(
                resolve,
                ms
            )

    );

}

</script>

</body>

</html>
