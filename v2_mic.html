<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>IME MIC</title>
</head>

<body>

<button onclick="startRecording()">
HELLO IME
</button>

<button onclick="stopRecording()">
GOOD NIGHT IME
</button>

<script>

let mediaRecorder;

let audioChunks = [];

let audioContext;

let analyser;

let dataArray;

let currentMicrophoneLevel = 0;

let microphoneAnimationFrame;

function updateMicrophoneLevel(){

    if(
        !analyser
    ){
        return;
    }

    analyser.getByteTimeDomainData(
        dataArray
    );

    let sum = 0;

    for(
        let i = 0;
        i < dataArray.length;
        i++
    ){

        const sample =
            (
                dataArray[i] -
                128
            ) / 128;

        sum +=
            sample *
            sample;

    }

    const rms =
        Math.sqrt(
            sum /
            dataArray.length
        );

    currentMicrophoneLevel =
        rms;

    console.log(
        "MIC LEVEL:",
        currentMicrophoneLevel
    );

    microphoneAnimationFrame =
        requestAnimationFrame(
            updateMicrophoneLevel
        );

}

async function startRecording(){

    try{

        console.log(
            "IME START"
        );

        const stream =
            await navigator
                .mediaDevices
                .getUserMedia({
                    audio: true
                });

        console.log(
            "MIC PERMISSION GRANTED"
        );

        audioContext =
            new AudioContext();

        const source =
            audioContext
                .createMediaStreamSource(
                    stream
                );

        analyser =
            audioContext
                .createAnalyser();

        analyser.fftSize =
            1024;

        source.connect(
            analyser
        );

        dataArray =
            new Uint8Array(
                analyser.frequencyBinCount
            );

        updateMicrophoneLevel();

        mediaRecorder =
            new MediaRecorder(
                stream
            );

        audioChunks = [];

        mediaRecorder.ondataavailable =
            event => {

                audioChunks.push(
                    event.data
                );

            };

        mediaRecorder.start();

        console.log(
            "RECORDING..."
        );

    }
    catch(error){

        console.error(
            error
        );

    }

}

async function stopRecording(){

    if(
        !mediaRecorder
    ){
        return;
    }

    mediaRecorder.onstop =
        async () => {

            cancelAnimationFrame(
                microphoneAnimationFrame
            );

            const audioBlob =
                new Blob(
                    audioChunks,
                    {
                        type:
                        "audio/webm;codecs=opus"
                    }
                );

            console.log(
                "AUDIO SIZE:",
                audioBlob.size
            );

            const formData =
                new FormData();

            formData.append(
                "audio",
                audioBlob,
                "ime_audio.webm"
            );

            const response =
                await fetch(
                    "https://www.visions-real.com/_functions/v2_voice_upload",
                    {
                        method:"POST",
                        body:formData
                    }
                );

            const result =
                await response.json();

            console.log(
                "WHISPER RESULT:",
                result
            );

            if(
                window.parent
            ){

                window.parent.postMessage(
                    {
                        imeState:
                            "thinking",
                        transcript:
                            result.transcript || "",
                        audioLevel:
                            currentMicrophoneLevel
                    },
                    "*"
                );

            }

        };

    mediaRecorder.stop();

}

setInterval(()=>{

    if(
        window.parent
    ){

        window.parent.postMessage(
            {
                imeState:
                    "listening",
                audioLevel:
                    currentMicrophoneLevel
            },
            "*"
        );

    }

},50);

</script>

</body>

</html>
