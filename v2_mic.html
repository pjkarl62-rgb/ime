<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0">

<title>IME Wakeup</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#container{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
}

.swarmDot{
    position:absolute;
    border-radius:50%;
    pointer-events:none;
}

#logoContainer{

    position:absolute;

    left:50%;
    top:42%;

    transform:
        translate(-50%,-50%);

    width:20vh;
    height:20vh;

    min-width:180px;
    min-height:180px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    animation:
        breathe 3s infinite ease-in-out;

    cursor:pointer;

}

@keyframes breathe{

    0%{
        transform:
            translate(-50%,-50%)
            scale(1);
    }

    50%{
        transform:
            translate(-50%,-50%)
            scale(1.05);
    }

    100%{
        transform:
            translate(-50%,-50%)
            scale(1);
    }

}

#logo{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

#ring{

    position:absolute;

    left:50%;
    top:50%;

    transform:
        translate(-50%,-50%);

    width:100%;
    height:100%;

    border-radius:50%;

    transition:
        opacity .8s ease;

}

.connectionModule{

    position:absolute;

    width:18px;
    height:18px;

    border-radius:50%;

    opacity:.15;

    transform:scale(.7);

    transition:
        all .8s ease;

}

.connectionModule.active{

    opacity:1;

    transform:scale(1.8);

}

#info{

    position:absolute;

    left:50%;
    bottom:8%;

    transform:
        translateX(-50%);

    width:90%;

    text-align:center;

    font-size:28px;

    line-height:1.4;

    opacity:.95;

}

@media(max-width:768px){

    #info{
        font-size:22px;
        width:88%;
    }

}

</style>

</head>

<body>

<div id="container">

    <div id="logoContainer">

        <div id="ring"></div>

        <img id="logo">

    </div>

    <div id="info">
        Tap IME to wake your companion
    </div>

</div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const returnUrl =
    params.get(
        "returnUrl"
    );

const bg =
    params.get(
        "bg"
    ) || "#000000";

const dots =
    params.get(
        "dots"
    ) || "#369AC4";

const logo =
    params.get(
        "logo"
    ) || "";

const companionName =
    params.get(
        "name"
    ) || "IME";

document.body.style.background =
    bg;

document.getElementById(
    "logo"
).src =
    logo;

document.getElementById(
    "ring"
).style.boxShadow =
    `0 0 80px ${dots}`;

document.getElementById(
    "info"
).style.color =
    dots;

/* ====================================== */
/* SWARM                                 */
/* ====================================== */

const swarm=[];

const mobile =
    window.innerWidth < 768;

const cols =
    mobile ? 36 : 60;

const rows =
    mobile ? 60 : 36;

const spacingX =
    window.innerWidth / cols;

const spacingY =
    window.innerHeight / rows;

for(let y=0;y<rows;y++){

    for(let x=0;x<cols;x++){

        const dot =
            document.createElement(
                "div"
            );

        dot.className =
            "swarmDot";

        const size =
            mobile ? 5 : 8;

        const px =
            x * spacingX;

        const py =
            y * spacingY;

        dot.style.left =
            px + "px";

        dot.style.top =
            py + "px";

        dot.style.width =
            size + "px";

        dot.style.height =
            size + "px";

        dot.style.background =
            dots;

        dot.style.boxShadow =
            `0 0 6px ${dots},
             0 0 12px ${dots}`;

        dot.style.opacity =
            "0.02";

        container.appendChild(
            dot
        );

        swarm.push({

            element:dot,

            x:px,
            y:py

        });

    }

}

function animateSwarm(){

    const t =
        performance.now()/1000;

    const lightX =

        window.innerWidth/2

        +

        Math.cos(
            t * 0.8
        )

        *

        window.innerWidth
        *
        0.35;

    const lightY =

        window.innerHeight/2

        +

        Math.sin(
            t * 0.6
        )

        *

        window.innerHeight
        *
        0.35;

    const lightRadius =

        Math.max(
            window.innerWidth,
            window.innerHeight
        )
        *
        0.30;

    swarm.forEach(

        p=>{

            const dx =
                p.x-lightX;

            const dy =
                p.y-lightY;

            const distance =
                Math.sqrt(
                    dx*dx
                    +
                    dy*dy
                );

            let alpha =

                1

                -

                (

                    distance
                    /
                    lightRadius

                );

            alpha =
                Math.max(
                    0,
                    alpha
                );

            alpha =
                alpha
                *
                alpha;

            alpha =
                alpha
                *
                0.95
                +
                0.03;

            p.element.style.opacity =
                alpha;

        }

    );

    requestAnimationFrame(
        animateSwarm
    );

}

animateSwarm();

/* ====================================== */
/* CONNECTION MODULES                     */
/* ====================================== */

const modules = [];

const positions = [

    {x:37.5,y:58},
    {x:42.5,y:58},
    {x:47.5,y:58},
    {x:52.5,y:58},
    {x:57.5,y:58},
    {x:62.5,y:58}

];

positions.forEach(

    p=>{

        const m =
            document.createElement(
                "div"
            );

        m.className =
            "connectionModule";

        m.style.left =
            p.x + "%";

        m.style.top =
            p.y + "%";

        m.style.background =
            dots;

        container.appendChild(
            m
        );

        modules.push(
            m
        );

    }

);







// ======================================
// IME RUNTIME
// ======================================

let imeListening = false;
let mediaRecorder = null;
let audioChunks = [];

async function startPermanentListening(stream){

    imeListening = true;

    mediaRecorder = new MediaRecorder(
        stream,
        {
            mimeType:"audio/webm"
        }
    );

    mediaRecorder.ondataavailable = event => {

        if(event.data.size > 0){

            audioChunks.push(
                event.data
            );

        }

    };

    mediaRecorder.onstop = async ()=>{

        if(audioChunks.length===0){
            restartRecorder();
            return;
        }

        const blob =
            new Blob(
                audioChunks,
                {
                    type:"audio/webm"
                }
            );

        audioChunks=[];

        await uploadChunk(blob);

        restartRecorder();

    };

    restartRecorder();

}

function restartRecorder(){

    if(!imeListening){
        return;
    }

    mediaRecorder.start();

    setTimeout(()=>{

        if(
            mediaRecorder.state ===
            "recording"
        ){
            mediaRecorder.stop();
        }

    },3000);

}

async function uploadChunk(blob){

    try{

        window.parent.postMessage({

            type:"imeStatus",
            status:"uploading"

        },"*");

        const form =
            new FormData();

        form.append(
            "file",
            blob,
            "ime_audio.webm"
        );

        const response =
            await fetch(

                "https://www.visions-real.com/_functions/v2_voice_upload",

                {
                    method:"POST",
                    body:form
                }

            );

        const result =
            await response.json();

        if(!result.transcript){
            return;
        }

        const transcript =
            result.transcript
            .trim();

        //window.parent.postMessage({

        //    type: "microphoneTranscript",

        //    transcript: transcript

        //},"*");            

        console.log(
            "IME:",
            transcript
        );

        window.parent.postMessage({

            type:"transcript",
            transcript:transcript

        },"*");

        window.parent.postMessage({

            type:"imeStatus",
            status:"thinking"

        },"*");

        const lower =
            transcript
            .toLowerCase();

        if(
            lower.includes(
                "ime setup"
            )
        ){

            window.parent.postMessage({

                type:"imeSetup"

            },"*");

        }

        else if(
            lower.includes(
                "kalender"
            )
        ){

            window.parent.postMessage({

                type:"openCalendar"

            },"*");

        }

        else if(
            lower.startsWith(
                "ime "
            )
        ){

            const command =
                transcript
                .substring(4)
                .trim();

            window.parent.postMessage({

                type:"imeCommand",
                command:command

            },"*");

        }

        window.parent.postMessage({

            type:"imeStatus",
            status:"listening"

        },"*");

    }
    catch(error){

        console.log(error);

    }

}










async function wakeIME(){

    try{

        //await navigator
        //.mediaDevices
        //.getUserMedia({

        //    audio:true

        //});

        const stream =
            await navigator
            .mediaDevices
            .getUserMedia({

                audio:true

            });

        await startPermanentListening(
            stream
        );


        document.getElementById(
            "info"
        ).innerText =
            "Initializing IME ...";

        modules.forEach(

            (m,index)=>{

                setTimeout(

                    ()=>{

                        m.classList.add(
                            "active"
                        );

                    },

                    index
                    *
                    450

                );

            }

        );

        setTimeout(

            ()=>{

                document.getElementById(
                    "info"
                ).innerText =
                    companionName
                    +
                    " is online";

            },

            3500

        );

        setTimeout(

            ()=>{

                if(
                    returnUrl
                ){

                    window.location.href =
                        returnUrl
                        +
                        "?ime=active";

                }

            },

            5200

        );

    }
    catch(error){

        document.getElementById(
            "info"
        ).innerText =
            "Microphone access required";

    }

}

document.getElementById(
    "logoContainer"
)
.addEventListener(

    "click",

    wakeIME

);

</script>

</body>
</html>
