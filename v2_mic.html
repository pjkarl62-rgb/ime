<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IME Microphone</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    text-align:center;
    padding-top:80px;
}

button{
    padding:15px 30px;
    margin:10px;
    font-size:18px;
    cursor:pointer;
}

#status{
    margin-top:30px;
    font-size:22px;
}

#timer{
    margin-top:20px;
    font-size:18px;
}

#result{
    margin-top:40px;
    width:80%;
    max-width:900px;
    margin-left:auto;
    margin-right:auto;
    text-align:left;
    background:#222;
    padding:20px;
    border-radius:10px;
    min-height:120px;
}
</style>
</head>

<body>

<h1>🎤 IME Microphone</h1>

<button id="startBtn">
Start Recording
</button>

<button id="stopBtn" disabled>
Stop Recording
</button>

<div id="status">
Waiting...
</div>

<div id="timer"></div>

<div id="result"></div>

<script>

let mediaRecorder;
let audioChunks = [];
let timerInterval;
let seconds = 0;

const startBtn = document.getElementById("startBtn");
const stopBtn = document.getElementById("stopBtn");

const statusDiv = document.getElementById("status");
const timerDiv = document.getElementById("timer");
const resultDiv = document.getElementById("result");

startBtn.onclick = async () => {

    try {

        const stream =
            await navigator.mediaDevices.getUserMedia({
                audio:true
            });

        audioChunks = [];

        mediaRecorder =
            new MediaRecorder(stream);

        mediaRecorder.ondataavailable =
            event => {

            audioChunks.push(
                event.data
            );
        };

        mediaRecorder.onstop =
            async () => {

            clearInterval(
                timerInterval
            );

            const audioBlob =
                new Blob(
                    audioChunks,
                    {
                        type:"audio/webm"
                    }
                );

            await sendAudioToWix(
                audioBlob
            );
        };

        mediaRecorder.start();

        startBtn.disabled = true;
        stopBtn.disabled = false;

        statusDiv.innerText =
            "🎤 Recording...";

        seconds = 0;

        timerInterval =
            setInterval(() => {

            seconds++;

            timerDiv.innerText =
                seconds +
                " seconds";

        },1000);

    }
    catch(error){

        statusDiv.innerText =
            error.message;
    }
};

stopBtn.onclick = () => {

    mediaRecorder.stop();

    startBtn.disabled = false;
    stopBtn.disabled = true;

    statusDiv.innerText =
        "Uploading audio...";
};

async function sendAudioToWix(
    audioBlob
){

    const formData =
        new FormData();

    formData.append(
        "audio",
        audioBlob,
        "voice.webm"
    );

    try{

        const response =
            await fetch(
                "https://www.visions-real.com/_functions/v2_voice_upload",
                {
                    method:"POST",
                    body:formData
                }
            );

        const data =
            await response.json();

        resultDiv.innerHTML =
            "<b>Transcript:</b><br><br>" +
            data.transcript;

        statusDiv.innerText =
            "Ready";

    }
    catch(error){

        statusDiv.innerText =
            error.message;
    }
}

</script>

</body>

</html>
