<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
/>

<title>IME Microphone</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000000;
    color:white;
}

#container{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
}

.star{
    position:absolute;
    border-radius:50%;
    opacity:.35;

    animation:
        pulse 2.5s infinite ease-in-out,
        drift 8s infinite ease-in-out;
}

@keyframes pulse{
    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.5);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

@keyframes drift{
    0%{
        transform:
            translate(0px,0px);
    }

    50%{
        transform:
            translate(12px,-10px);
    }

    100%{
        transform:
            translate(0px,0px);
    }
}

#logoContainer{

    position:absolute;

    left:50%;
    top:45%;

    transform:
        translate(-50%,-50%);

    width:240px;
    height:240px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    backdrop-filter:blur(12px);

    animation:
        breathe 3s infinite ease-in-out;
}

@keyframes breathe{

    0%{
        transform:
            translate(-50%,-50%)
            scale(1);
    }

    50%{
        transform:
            translate(-50%,-50%)
            scale(1.04);
    }

    100%{
        transform:
            translate(-50%,-50%)
            scale(1);
    }

}

#logo{

    width:100%;
    height:100%;

    border-radius:50%;

    object-fit:cover;

}

#activateButton{

    position:absolute;

    left:50%;
    top:72%;

    transform:
        translateX(-50%);

    padding:

        16px
        36px;

    border:none;
    border-radius:40px;

    font-size:18px;

    cursor:pointer;

    transition:
        all .3s ease;

}

#activateButton:hover{
    transform:
        translateX(-50%)
        scale(1.05);
}

#info{

    position:absolute;

    width:100%;

    text-align:center;

    top:62%;

    font-size:18px;

    opacity:.8;
}

</style>
</head>

<body>

<div id="container">

    <div id="logoContainer">
        <img id="logo">
    </div>

    <div id="info">
        Activate microphone to wake up IME
    </div>

    <button id="activateButton">
        Activate IME
    </button>

</div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const returnUrl =
    params.get(
        "returnUrl"
    );

const bg =
    params.get(
        "bg"
    ) || "#000000";

const dots =
    params.get(
        "dots"
    ) || "#00FFAA";

const logo =
    params.get(
        "logo"
    ) || "";

const companionName =
    params.get(
        "name"
    ) || "IME";

document.body.style.background =
    bg;

document.getElementById(
    "logo"
).src =
    logo;

document.getElementById(
    "activateButton"
).style.background =
    dots;

document.getElementById(
    "activateButton"
).style.color =
    bg;

function createParticles(){

    const isMobile =
        window.innerWidth < 768;

    const particleCount =
        isMobile ? 40 : 80;

    const radius =
        isMobile ? 22 : 32;

    const size =
        isMobile ? 3 : 5;

    for(
        let i=0;
        i<particleCount;
        i++
    ){

        const star =
            document.createElement(
                "div"
            );

        star.className =
            "star";

        const angle =
            Math.random()
            *
            Math.PI
            *
            2;

        const distance =
            Math.sqrt(
                Math.random()
            )
            *
            radius;

        const x =
            50
            +
            Math.cos(angle)
            *
            distance;

        const y =
            45
            +
            Math.sin(angle)
            *
            distance;

        star.style.left =
            x + "%";

        star.style.top =
            y + "%";

        star.style.width =
            size + "px";

        star.style.height =
            size + "px";

        star.style.background =
            dots;

        star.style.animationDelay =
            Math.random()
            *
            5
            +
            "s";

        document
            .getElementById(
                "container"
            )
            .appendChild(
                star
            );

    }

}

createParticles();

document
.getElementById(
    "activateButton"
)
.addEventListener(

    "click",

    async()=>{

        try{

            await navigator
                .mediaDevices
                .getUserMedia({

                    audio:true

                });

            if(
                returnUrl
            ){

                window.location.href =
                    returnUrl
                    +
                    "?ime=active";

            }

        }
        catch(error){

            console.error(
                error
            );

            alert(
                "Microphone permission required for IME."
            );

        }

    }

);

</script>

</body>
</html>
