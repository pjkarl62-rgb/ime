<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>IME Wakeup</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    background:#000;
}

#container{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* ----------------------------------- */
/* STAR FIELD                          */
/* ----------------------------------- */

.star{
    position:absolute;
    border-radius:50%;
    opacity:.2;

    animation:
        starPulse 2.4s infinite ease-in-out,
        starMove 8s infinite ease-in-out;
}

@keyframes starPulse{

    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.7);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }

}

@keyframes starMove{

    0%{
        transform:translate(0px,0px);
    }

    50%{
        transform:translate(8px,-8px);
    }

    100%{
        transform:translate(0px,0px);
    }

}

/* ----------------------------------- */
/* CONNECTION MODULES                  */
/* ----------------------------------- */

.connection{

    position:absolute;

    width:18px;
    height:18px;

    border-radius:50%;

    opacity:.15;

    transition:
        all .6s ease;

}

.connection.active{

    opacity:1;

    transform:scale(1.6);

}

/* ----------------------------------- */
/* LOGO                                */
/* ----------------------------------- */

#logoContainer{

    position:absolute;

    left:50%;
    top:44%;

    width:320px;
    height:320px;

    transform:
        translate(-50%,-50%);

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    animation:
        breathe 3s infinite ease-in-out;

}

@keyframes breathe{

    0%{
        transform:
            translate(-50%,-50%)
            scale(1);
    }

    50%{
        transform:
            translate(-50%,-50%)
            scale(1.05);
    }

    100%{
        transform:
            translate(-50%,-50%)
            scale(1);
    }

}

#logo{
    width:100%;
    height:100%;
    border-radius:50%;
    object-fit:cover;
}

/* ----------------------------------- */
/* TEXT                                */
/* ----------------------------------- */

#info{

    position:absolute;

    left:50%;
    bottom:10%;

    width:88%;

    transform:
        translateX(-50%);

    color:white;

    text-align:center;

    font-size:34px;

    line-height:1.4;

    opacity:.9;

}

/* ----------------------------------- */
/* MOBILE                              */
/* ----------------------------------- */

@media(max-width:768px){

    #logoContainer{
        width:250px;
        height:250px;
    }

    #info{
        font-size:24px;
        width:90%;
    }

}

</style>

</head>

<body>

<div id="container">

    <div id="logoContainer">
        <img id="logo">
    </div>

    <div id="info">
        Tap IME to wake your companion
    </div>

</div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const returnUrl =
    params.get(
        "returnUrl"
    );

const bg =
    params.get(
        "bg"
    ) || "#000000";

const dots =
    params.get(
        "dots"
    ) || "#00FFAA";

const logo =
    params.get(
        "logo"
    ) || "";

const companionName =
    params.get(
        "name"
    ) || "IME";

document.body.style.background =
    bg;

document.getElementById(
    "logo"
).src =
    logo;

document.getElementById(
    "logoContainer"
).style.boxShadow =
    `0 0 60px ${dots}`;

/* ---------------------------- */
/* STAR FIELD                   */
/* ---------------------------- */

const mobile =
    window.innerWidth < 768;

const starCount =
    mobile ? 25 : 60;

const radius =
    mobile ? 24 : 33;

const centerX = 50;
const centerY = 44;

for(let i=0;i<starCount;i++){

    const star =
        document.createElement(
            "div"
        );

    star.className =
        "star";

    const angle =
        Math.random()
        *
        Math.PI
        *
        2;

    const distance =
        Math.sqrt(
            Math.random()
        )
        *
        radius;

    const x =
        centerX
        +
        Math.cos(angle)
        *
        distance;

    const y =
        centerY
        +
        Math.sin(angle)
        *
        distance;

    const size =
        mobile
            ? 2 + Math.random()*2
            : 3 + Math.random()*4;

    star.style.left =
        x + "%";

    star.style.top =
        y + "%";

    star.style.width =
        size + "px";

    star.style.height =
        size + "px";

    star.style.background =
        dots;

    star.style.animationDelay =
        Math.random()
        *
        3
        +
        "s";

    container.appendChild(
        star
    );

}

/* ---------------------------- */
/* CONNECTION MODULES           */
/* ---------------------------- */

const connectionPositions = [

    {x:50,y:12},
    {x:72,y:25},
    {x:72,y:63},
    {x:50,y:76},
    {x:28,y:63},
    {x:28,y:25}

];

const modules = [];

connectionPositions.forEach(

    p=>{

        const c =
            document.createElement(
                "div"
            );

        c.className =
            "connection";

        c.style.left =
            p.x + "%";

        c.style.top =
            p.y + "%";

        c.style.background =
            dots;

        container.appendChild(
            c
        );

        modules.push(
            c
        );

    }

);

/* ---------------------------- */
/* WAKEUP                       */
/* ---------------------------- */

async function wakeIME(){

    try{

        await navigator
            .mediaDevices
            .getUserMedia({

                audio:true

            });

        document.getElementById(
            "info"
        ).innerText =
            "Establishing IME systems...";

        modules.forEach(

            (m,index)=>{

                setTimeout(

                    ()=>{

                        m.classList.add(
                            "active"
                        );

                    },

                    index*500

                );

            }

        );

        setTimeout(

            ()=>{

                document.getElementById(
                    "info"
                ).innerText =

                    companionName
                    +
                    " is online";

            },

            3500

        );

        setTimeout(

            ()=>{

                console.log(
                    "RETURN URL:",
                    returnUrl
                );

                if(
                    returnUrl
                ){

                    window.location.href =

                        returnUrl

                        +

                        "?ime=active";

                }

            },

            4700

        );

    }
    catch(error){

        console.log(
            error
        );

        document.getElementById(
            "info"
        ).innerText =
            "Microphone access required";

    }

}

document.getElementById(
    "logoContainer"
)
.addEventListener(

    "click",

    wakeIME

);

</script>

</body>

</html>
