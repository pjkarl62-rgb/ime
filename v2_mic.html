<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IME Microphone Debug V2</title>

<style>
    body{
        font-family: Arial, sans-serif;
        background:#111;
        color:white;
        text-align:center;
        padding-top:60px;
    }

    button{
        padding:15px 30px;
        font-size:20px;
        cursor:pointer;
        margin-top:20px;
    }

    #status{
        margin-top:30px;
        font-size:24px;
    }

    #log{
        margin-top:40px;
        width:90%;
        max-width:900px;
        margin-left:auto;
        margin-right:auto;
        background:#222;
        border-radius:10px;
        padding:20px;
        text-align:left;
        min-height:250px;
        white-space:pre-wrap;
        overflow-y:auto;
    }
</style>
</head>

<body>

<h1>🎤 IME Microphone Debug V2</h1>

<button id="startBtn">
    Activate Microphone
</button>

<div id="status">
    Waiting for activation...
</div>

<div id="log"></div>

<script>

let recognition;

const startBtn = document.getElementById("startBtn");
const statusDiv = document.getElementById("status");
const logDiv = document.getElementById("log");

function log(message) {
    console.log(message);
    logDiv.innerHTML += message + "<br>";
    logDiv.scrollTop = logDiv.scrollHeight;
}

startBtn.onclick = async () => {

    startBtn.disabled = true;

    try {

        log("Requesting microphone permission...");

        const stream = await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        log("✅ Microphone permission granted.");
        log("Audio tracks found: " + stream.getAudioTracks().length);

        startRecognition();

    }
    catch(error) {

        log("❌ getUserMedia error:");
        log(error.name);
        log(error.message);

        startBtn.disabled = false;
    }
};

function startRecognition() {

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if (!SpeechRecognition) {
        log("❌ SpeechRecognition not available in this browser.");
        return;
    }

    log("SpeechRecognition object found.");

    recognition = new SpeechRecognition();

    recognition.lang = "en-US";
    recognition.continuous = false;
    recognition.interimResults = true;
    recognition.maxAlternatives = 5;

    recognition.onstart = () => {
        log("🎤 recognition.onstart");
        statusDiv.innerText = "Listening...";
    };

    recognition.onaudiostart = () => {
        log("🔊 onaudiostart");
    };

    recognition.onsoundstart = () => {
        log("🔈 onsoundstart");
    };

    recognition.onspeechstart = () => {
        log("🗣 onspeechstart");
    };

    recognition.onresult = (event) => {

        log("✅ onresult fired");

        for(let i = event.resultIndex; i < event.results.length; i++) {

            const transcript =
                event.results[i][0].transcript;

            const confidence =
                event.results[i][0].confidence;

            log(
                "Recognized: " +
                transcript +
                " | confidence: " +
                confidence
            );

            const text = transcript.toUpperCase();

            if(
                text.includes("HELLO IME") ||
                text.includes("HI IME") ||
                text.includes("HEY IME") ||
                text.includes("IME")
            ) {
                log("🚀 IME wakeword detected");
            }
        }
    };

    recognition.onspeechend = () => {
        log("🛑 onspeechend");
    };

    recognition.onsoundend = () => {
        log("🔇 onsoundend");
    };

    recognition.onaudioend = () => {
        log("🎧 onaudioend");
    };

    recognition.onerror = (event) => {
        log("❌ recognition.onerror");
        log("Error: " + event.error);
    };

    recognition.onend = () => {
        log("🏁 recognition.onend");
        statusDiv.innerText = "Recognition finished";
        startBtn.disabled = false;
        startBtn.innerText = "Start Again";
    };

    try {
        recognition.start();
        log("recognition.start() executed");
    }
    catch(error) {
        log("❌ start() exception");
        log(error.message);
    }
}

</script>

</body>
</html>
