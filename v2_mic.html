<!DOCTYPE html>

<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1">

<title>IME Wakeup</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

body{
    background:#000000;
    display:flex;
    justify-content:center;
    align-items:center;
}

#container{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
}

.connectionNode{

    position:absolute;

    border-radius:50%;

    opacity:0;

    transform:scale(.4);

    transition:
        opacity .8s ease,
        transform .8s ease;

}

.connectionNode.active{

    opacity:1;

    transform:scale(1);

}

#logoContainer{

    position:absolute;

    left:50%;
    top:45%;

    transform:
        translate(-50%,-50%);

    width:240px;
    height:240px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    transition:
        box-shadow .4s ease;

    animation:
        breathe 3s infinite ease-in-out;

}

@keyframes breathe{

    0%{
        transform:
            translate(-50%,-50%)
            scale(1);
    }

    50%{
        transform:
            translate(-50%,-50%)
            scale(1.05);
    }

    100%{
        transform:
            translate(-50%,-50%)
            scale(1);
    }

}

#logo{

    width:100%;
    height:100%;

    object-fit:cover;

    border-radius:50%;

}

#info{

    position:absolute;

    bottom:10%;

    width:100%;

    text-align:center;

    color:white;

    opacity:.85;

    font-size:32px;

    font-weight:300;

    padding-left:30px;
    padding-right:30px;

}

@media(max-width:768px){

    #logoContainer{
        width:180px;
        height:180px;
    }

    #info{
        font-size:24px;
    }

}

</style>

</head>

<body>

<div id="container">

```
<div id="logoContainer">
    <img id="logo">
</div>

<div id="info">

    Tap IME to wake your companion

</div>
```

</div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const returnUrl =
    params.get(
        "returnUrl"
    );

const bg =
    params.get(
        "bg"
    ) || "#000000";

const dots =
    params.get(
        "dots"
    ) || "#00FFAA";

const logo =
    params.get(
        "logo"
    ) || "";

const companionName =
    params.get(
        "name"
    ) || "IME";


document.body.style.background =
    bg;

document
.getElementById(
    "logo"
)
.src =
    logo;

document
.getElementById(
    "logoContainer"
)
.style.boxShadow =

    `0 0 40px ${dots}`;

function createConnections(){

    const isMobile =
        window.innerWidth < 768;

    const count =
        isMobile
            ? 18
            : 35;

    const radius =
        isMobile
            ? 22
            : 30;

    const centerX = 50;
    const centerY = 45;

    const nodes = [];

    for(let i=0;i<count;i++){

        const node =
            document.createElement(
                "div"
            );

        node.className =
            "connectionNode";

        const angle =
            Math.random()
            *
            Math.PI
            *
            2;

        const distance =
            Math.sqrt(
                Math.random()
            )
            *
            radius;

        const x =
            centerX
            +
            Math.cos(angle)
            *
            distance;

        const y =
            centerY
            +
            Math.sin(angle)
            *
            distance;

        const size =
            isMobile
                ? (
                    2
                    +
                    Math.random()*3
                )
                : (
                    3
                    +
                    Math.random()*5
                );

        node.style.left =
            x + "%";

        node.style.top =
            y + "%";

        node.style.width =
            size + "px";

        node.style.height =
            size + "px";

        node.style.background =
            dots;

        document
        .getElementById(
            "container"
        )
        .appendChild(
            node
        );

        nodes.push(
            node
        );

    }

    return nodes;

}

const nodes =
    createConnections();

async function wakeIME(){

    try{

        await navigator
            .mediaDevices
            .getUserMedia({

                audio:true

            });

        document
        .getElementById(
            "info"
        )
        .innerText =

            "Awakening "
            +
            companionName
            +
            "...";

        for(

            let i=0;
            i<nodes.length;
            i++

        ){

            setTimeout(

                ()=>{

                    nodes[i]
                    .classList
                    .add(
                        "active"
                    );

                },

                i*60

            );

        }

        setTimeout(

            ()=>{

                document
                .getElementById(
                    "info"
                )
                .innerText =

                    companionName
                    +
                    " is online";

            },

            2500

        );

        setTimeout(

            ()=>{

                if(
                    returnUrl
                ){

                    window.location.href =

                        returnUrl

                        +

                        "?ime=active";

                }

            },

            4200

        );

    }
    catch(error){

        console.error(
            error
        );

        document
        .getElementById(
            "info"
        )
        .innerText =

            "Microphone access required";

    }

}

document
.getElementById(
    "logoContainer"
)
.addEventListener(

    "click",

    wakeIME

);

</script>

</body>
</html>
