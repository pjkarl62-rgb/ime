<html>

<head>
<meta charset="UTF-8">
<title>IME MIC</title>
</head>

<body>

<h2>IME microphone test</h2>

<button onclick="startRecording()">
START RECORDING
</button>

<button onclick="stopRecording()">
STOP RECORDING
</button>

<script>

let mediaRecorder;
let audioChunks = [];

async function startRecording() {

    console.log("MIC START");

    const stream =
        await navigator.mediaDevices.getUserMedia({
            audio: true
        });

    mediaRecorder =
        new MediaRecorder(stream);

    audioChunks = [];

    mediaRecorder.ondataavailable = event => {

        audioChunks.push(
            event.data
        );

    };

    mediaRecorder.start();

    console.log(
        "RECORDING..."
    );

}

async function stopRecording() {

    console.log(
        "STOP RECORDING"
    );

    mediaRecorder.stop();

    mediaRecorder.onstop =
        async () => {

            const audioBlob =
                new Blob(
                    audioChunks,
                    {
                        type: "audio/webm"
                    }
                );

            console.log(
                "AUDIO SIZE:",
                audioBlob.size
            );

            const formData =
                new FormData();

            formData.append(
                "audio",
                audioBlob,
                "ime_audio.webm"
            );

            const response =
                await fetch(
                    "https://www.visions-real.com/_functions/v2_voice_upload",
                    {
                        method: "POST",
                        body: formData
                    }
                );

            const result =
                await response.json();

            console.log(
                result
            );

        };

}

</script>

</body>
</html>
