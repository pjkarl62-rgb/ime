<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IME V2 Microphone Listener</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: white;
        text-align: center;
        padding-top: 60px;
        margin: 0;
    }

    h1 {
        margin-bottom: 20px;
    }

    p {
        max-width: 700px;
        margin: auto;
        line-height: 1.5;
    }

    button {
        margin-top: 30px;
        padding: 15px 30px;
        font-size: 18px;
        cursor: pointer;
    }

    #status {
        margin-top: 30px;
        font-size: 22px;
        font-weight: bold;
    }

    #log {
        margin: 40px auto;
        width: 85%;
        max-width: 900px;
        background: #222;
        border-radius: 10px;
        padding: 20px;
        text-align: left;
        min-height: 250px;
        overflow-y: auto;
        white-space: pre-wrap;
    }
</style>
</head>

<body>

<h1>🎤 IME V2 Microphone Listener</h1>

<p>
Click once to activate the microphone.<br>
After activation you will automatically return to your IME page.<br>
This tab will continue listening in the background.
</p>

<button id="startBtn">
    Activate Microphone
</button>

<div id="status">
    Waiting for microphone activation...
</div>

<div id="log"></div>

<script>

let recognition = null;
let listening = false;

const startBtn = document.getElementById("startBtn");
const statusDiv = document.getElementById("status");
const logDiv = document.getElementById("log");

function log(message) {

    console.log(message);

    logDiv.innerHTML += message + "\n";
    logDiv.scrollTop = logDiv.scrollHeight;
}

startBtn.onclick = async () => {

    if (listening) {
        return;
    }

    try {

        startBtn.disabled = true;
        startBtn.innerText = "Microphone Active";

        await navigator.mediaDevices.getUserMedia({
            audio: true
        });

        log("✅ Microphone permission granted.");

        startRecognition();

    } catch (error) {

        startBtn.disabled = false;
        startBtn.innerText = "Activate Microphone";

        statusDiv.innerText =
            "❌ Microphone permission denied.";

        log("Microphone error: " + error.message);
    }
};

function startRecognition() {

    const SpeechRecognition =
        window.SpeechRecognition ||
        window.webkitSpeechRecognition;

    if (!SpeechRecognition) {

        statusDiv.innerText =
            "❌ Speech recognition not supported.";

        log("SpeechRecognition not supported.");

        return;
    }

    recognition = new SpeechRecognition();

    /*
        Brave works much more reliably with these settings.
    */

    recognition.continuous = false;
    recognition.interimResults = false;
    recognition.maxAlternatives = 5;

    /*
        IME V2 starts in English.
        Later this value will come from Wix.
    */

    recognition.lang = "en-US";

    recognition.onstart = () => {

        listening = true;

        statusDiv.innerText =
            "🎤 Listening for IME commands...";

        log("🎤 SpeechRecognition started.");
    };

    recognition.onresult = (event) => {

        const transcript =
            event.results[0][0].transcript.trim();

        log("Recognized: " + transcript);

        parseCommand(transcript);
    };

    recognition.onerror = (event) => {

        log("Recognition error: " + event.error);
    };

    recognition.onend = () => {

        listening = false;

        log("Recognition ended.");

        /*
            Restart listener automatically
        */

        setTimeout(() => {

            try {

                recognition.start();

            } catch (error) {

                log(
                    "Restart skipped: " +
                    error.message
                );
            }

        }, 1000);
    };

    try {

        recognition.start();

    } catch (error) {

        log("Start error: " + error.message);
    }

    /*
        Return user to Wix page
    */

    setTimeout(() => {

        if (window.opener) {

            log(
                "Returning to IME page..."
            );

            try {

                window.opener.focus();

            } catch (error) {

                log(
                    "Could not focus IME page."
                );
            }
        }

    }, 1500);
}

function parseCommand(text) {

    const command = text.toUpperCase();

    const wakeWords = [
        "HELLO IME",
        "HI IME",
        "HEY IME",
        "IME"
    ];

    const wakeDetected = wakeWords.some(
        wakeWord => command.includes(wakeWord)
    );

    if (!wakeDetected) {

        log("No IME wake word detected.");

        return;
    }

    log("✅ IME wake word detected.");

    /*
        Future command parsing
    */

    let payload = {
        wake: true,
        command: null,
        bot: null,
        query: null,
        transcript: command
    };

    /*
        IME SETUP
    */

    if (command.includes("SETUP")) {

        payload.command = "SETUP";
    }

    /*
        IME CALENDAR
    */

    else if (command.includes("CALENDAR")) {

        payload.command = "CALENDAR";
    }

    /*
        IME CONTACT
    */

    else if (command.includes("CONTACT")) {

        payload.command = "CONTACT";
    }

    /*
        IME ASK JEFF TESLA NEWS
    */

    else if (command.includes("ASK")) {

        payload.command = "ASK";

        const askIndex =
            command.indexOf("ASK");

        const afterAsk =
            command.substring(
                askIndex + 3
            ).trim();

        if (afterAsk.length > 0) {

            const words =
                afterAsk.split(" ");

            payload.bot = words[0];

            if (words.length > 1) {

                payload.query =
                    words
                    .slice(1)
                    .join(" ");
            }
        }
    }

    sendToWix(payload);
}

function sendToWix(payload) {

    log(
        "Sending to Wix:"
    );

    log(
        JSON.stringify(
            payload,
            null,
            2
        )
    );

    /*
        V2 endpoint

        Uncomment when backend exists.
    */

        {

                payload

        }
    )
    .then(response => response.json())
    .then(data => {
        log(
            "Wix response: " +
            JSON.stringify(data)
        );
    })
    .catch(error => {
        log(
            "Send error: " +
            error.message
        );
    });
    */
}

</script>

</body>
</html>
