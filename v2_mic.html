<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width,initial-scale=1.0">

<title>IME Wakeup</title>

<style>

html,body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:black;
    font-family:Arial,sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
}

#container{
    position:relative;
    width:100%;
    height:100%;
    overflow:hidden;
}

/* ====================================== */
/* STAR FIELD                             */
/* ====================================== */

.star{
    position:absolute;
    border-radius:50%;
    opacity:.2;

    animation:
        starPulse 2.5s infinite ease-in-out,
        starMove 8s infinite ease-in-out;
}

@keyframes starPulse{
    0%{
        opacity:.15;
        transform:scale(.7);
    }

    50%{
        opacity:1;
        transform:scale(1.8);
    }

    100%{
        opacity:.15;
        transform:scale(.7);
    }
}

@keyframes starMove{
    0%{
        transform:translate(0px,0px);
    }

    50%{
        transform:translate(8px,-8px);
    }

    100%{
        transform:translate(0px,0px);
    }
}

/* ====================================== */
/* LOGO                                   */
/* ====================================== */

#logoContainer{

    position:absolute;

    left:50%;
    top:42%;

    transform:
        translate(-50%,-50%);

    width:20vh;
    height:20vh;

    min-width:180px;
    min-height:180px;

    border-radius:50%;

    display:flex;
    justify-content:center;
    align-items:center;

    animation:
        breathe 3s infinite ease-in-out;

    cursor:pointer;

}

@keyframes breathe{

    0%{
        transform:
            translate(-50%,-50%)
            scale(1);
    }

    50%{
        transform:
            translate(-50%,-50%)
            scale(1.05);
    }

    100%{
        transform:
            translate(-50%,-50%)
            scale(1);
    }

}

#logo{
    width:100%;
    height:100%;
    object-fit:cover;
    border-radius:50%;
}

#ring{

    position:absolute;

    left:50%;
    top:50%;

    transform:
        translate(-50%,-50%);

    width:100%;
    height:100%;

    border-radius:50%;

    transition:
        opacity .8s ease;

}

/* ====================================== */
/* CONNECTION MODULES                     */
/* ====================================== */

.connectionModule{

    position:absolute;

    width:18px;
    height:18px;

    border-radius:50%;

    opacity:.15;

    transform:scale(.7);

    transition:
        all .8s ease;

}

.connectionModule.active{

    opacity:1;

    transform:scale(1.8);

}

/* ====================================== */
/* INFO                                   */
/* ====================================== */

#info{

    position:absolute;

    left:50%;
    bottom:8%;

    transform:
        translateX(-50%);

    width:90%;

    text-align:center;

    font-size:28px;

    line-height:1.4;

    opacity:.95;

}

@media(max-width:768px){

    #info{
        font-size:22px;
        width:88%;
    }

}

</style>

</head>

<body>

<div id="container">

    <div id="logoContainer">

        <div id="ring"></div>

        <img id="logo">

    </div>

    <div id="info">
        Tap IME to wake your companion
    </div>

</div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const returnUrl =
    params.get(
        "returnUrl"
    );

const bg =
    params.get(
        "bg"
    ) || "#000000";

const dots =
    params.get(
        "dots"
    ) || "#369AC4";

const logo =
    params.get(
        "logo"
    ) || "";

const companionName =
    params.get(
        "name"
    ) || "IME";

document.body.style.background =
    bg;

document.getElementById(
    "logo"
).src =
    logo;

document.getElementById(
    "ring"
).style.boxShadow =
    `0 0 80px ${dots}`;

document.getElementById(
    "info"
).style.color =
    dots;

/* ====================================== */
/* STAR FIELD                             */
/* ====================================== */

const mobile =
    window.innerWidth < 768;

const starCount =
    mobile
        ? 24
        : 60;

const radius =
    mobile
        ? 18
        : 28;

for(
    let i=0;
    i<starCount;
    i++
){

    const star =
        document.createElement(
            "div"
        );

    star.className =
        "star";

    const angle =
        Math.random()
        *
        Math.PI
        *
        2;

    const distance =
        Math.sqrt(
            Math.random()
        )
        *
        radius;

    const x =
        50
        +
        Math.cos(angle)
        *
        distance;

    const y =
        42
        +
        Math.sin(angle)
        *
        distance;

    const size =
        mobile
            ? 2 + Math.random()*2
            : 3 + Math.random()*4;

    star.style.left =
        x + "%";

    star.style.top =
        y + "%";

    star.style.width =
        size + "px";

    star.style.height =
        size + "px";

    star.style.background =
        dots;

    star.style.animationDelay =
        Math.random()
        *
        4
        +
        "s";

    container.appendChild(
        star
    );

}

/* ====================================== */
/* CONNECTION MODULES                     */
/* ====================================== */

const modules = [];

const positions = [

    {x:38,y:58},
    {x:44,y:58},
    {x:50,y:58},
    {x:56,y:58},
    {x:62,y:58},
    {x:68,y:58}

];

positions.forEach(

    p=>{

        const m =
            document.createElement(
                "div"
            );

        m.className =
            "connectionModule";

        m.style.left =
            p.x + "%";

        m.style.top =
            p.y + "%";

        m.style.background =
            dots;

        container.appendChild(
            m
        );

        modules.push(
            m
        );

    }

);

async function wakeIME(){

    try{

        await navigator
        .mediaDevices
        .getUserMedia({

            audio:true

        });

        document.getElementById(
            "info"
        ).innerText =
            "Initializing IME ...";

        modules.forEach(

            (m,index)=>{

                setTimeout(

                    ()=>{

                        m.classList.add(
                            "active"
                        );

                    },

                    index
                    *
                    450

                );

            }

        );

        setTimeout(

            ()=>{

                document.getElementById(
                    "info"
                ).innerText =
                    companionName
                    +
                    " is online";

            },

            3500

        );

        setTimeout(

            ()=>{

                if(
                    returnUrl
                ){

                    window.location.href =
                        returnUrl
                        +
                        "?ime=active";

                }

            },

            5200

        );

    }
    catch(error){

        document.getElementById(
            "info"
        ).innerText =
            "Microphone access required";

    }

}

document.getElementById(
    "logoContainer"
)
.addEventListener(

    "click",

    wakeIME

);

</script>

</body>
</html>
