<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<title>IME MIC</title>
</head>

<body>

<button onclick="startRecording()">
START RECORDING
</button>

<button onclick="stopRecording()">
STOP RECORDING
</button>

<script>

let mediaRecorder;
let audioChunks = [];

async function startRecording() {

    console.log("MIC START");

    const stream =
        await navigator.mediaDevices.getUserMedia({
            audio: true
        });

    mediaRecorder =
        new MediaRecorder(stream);

    audioChunks = [];

    mediaRecorder.ondataavailable =
        (event) => {

            audioChunks.push(
                event.data
            );

        };

    mediaRecorder.start();

    console.log(
        "RECORDER:",
        mediaRecorder
    );

    console.log(
        "STATE:",
        mediaRecorder.state
    );

}

async function stopRecording() {

    console.log(
        "STOP RECORDING"
    );

    console.log(
        "RECORDER OBJECT:",
        mediaRecorder
    );

    if(!mediaRecorder) {

        console.log(
            "RECORDER IS NULL"
        );

        return;

    }

    console.log(
        "STATE:",
        mediaRecorder.state
    );

    mediaRecorder.stop();

}

</script>

</body>
</html>
