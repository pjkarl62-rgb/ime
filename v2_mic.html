<!DOCTYPE html>

<html>

<head>
<meta charset="UTF-8">
<title>IME MIC</title>
</head>

<body>

<h2>IME microphone test</h2>

<button onclick="startRecording()">
START RECORDING
</button>

<button onclick="stopRecording()">
STOP RECORDING
</button>

<script>

let mediaRecorder = null;
let audioChunks = [];
let stream = null;

async function startRecording() {

    try {

        console.log(
            "MIC START"
        );

        stream =
            await navigator.mediaDevices.getUserMedia({
                audio: true
            });

        mediaRecorder =
            new MediaRecorder(
                stream
            );

        audioChunks = [];

        mediaRecorder.ondataavailable =
            (event) => {

                if (
                    event.data.size > 0
                ) {

                    audioChunks.push(
                        event.data
                    );

                }

            };

        mediaRecorder.start();

        console.log(
            "RECORDER STATE:",
            mediaRecorder.state
        );

        console.log(
            "RECORDING..."
        );

    }
    catch(error) {

        console.error(
            "MIC ERROR:",
            error
        );

    }

}

async function stopRecording() {

    console.log(
        "STOP RECORDING"
    );

    if (
        !mediaRecorder ||
        mediaRecorder.state === "inactive"
    ) {

        console.log(
            "NO ACTIVE RECORDING"
        );

        return;

    }

    mediaRecorder.onstop =
        async () => {

            try {

                const audioBlob =
                    new Blob(
                        audioChunks,
                        {
                            type: "audio/webm"
                        }
                    );

                console.log(
                    "AUDIO SIZE:",
                    audioBlob.size
                );

                const formData =
                    new FormData();

                formData.append(
                    "audio",
                    audioBlob,
                    "ime_audio.webm"
                );

                const response =
                    await fetch(
                        "https://www.visions-real.com/_functions/v2_voice_upload",
                        {
                            method: "POST",
                            body: formData
                        }
                    );

                const result =
                    await response.json();

                console.log(
                    result
                );

                if (stream) {

                    stream
                        .getTracks()
                        .forEach(
                            track =>
                                track.stop()
                        );

                }

                mediaRecorder = null;
                stream = null;
                audioChunks = [];

            }
            catch(error) {

                console.error(
                    "UPLOAD ERROR:",
                    error
                );

            }

        };

    mediaRecorder.stop();

}

</script>

</body>

</html>
