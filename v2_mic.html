<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>IME Awakening</title>

<style>

html,body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#000;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;

}

#background{

    position:absolute;

    width:100%;
    height:100%;

    overflow:hidden;

}

.star{

    position:absolute;

    width:4px;
    height:4px;

    border-radius:50%;

    background:#7dff7d33;

    animation:
        twinkle 4s infinite ease-in-out;

}

@keyframes twinkle{

    0%{
        opacity:.2;
    }

    50%{
        opacity:1;
    }

    100%{
        opacity:.2;
    }

}

#core{

    position:relative;

    width:180px;
    height:180px;

    border-radius:50%;

    border:2px solid #7dff7d;

    display:flex;
    justify-content:center;
    align-items:center;

    cursor:pointer;

    animation:
        breathe 3s infinite ease-in-out;

    box-shadow:
        0 0 20px #7dff7d55,
        0 0 60px #7dff7d22;

    z-index:100;

}

@keyframes breathe{

    0%{

        transform:
            scale(1);

        box-shadow:
            0 0 20px #7dff7d55,
            0 0 60px #7dff7d22;

    }

    50%{

        transform:
            scale(1.06);

        box-shadow:
            0 0 40px #7dff7d88,
            0 0 100px #7dff7d44;

    }

    100%{

        transform:
            scale(1);

        box-shadow:
            0 0 20px #7dff7d55,
            0 0 60px #7dff7d22;

    }

}

#logo{

    width:120px;
    height:120px;

    border-radius:50%;

    object-fit:cover;

}

.node{

    position:absolute;

    width:16px;
    height:16px;

    border-radius:50%;

    background:#7dff7d;

    opacity:.1;

    transition:
        all .5s ease;

}

.active{

    opacity:1;

    transform:scale(2);

    box-shadow:
        0 0 20px #7dff7d,
        0 0 40px #7dff7d66;

}

#status{

    position:absolute;

    bottom:10%;

    width:100%;

    text-align:center;

    color:#7dff7d;

    letter-spacing:2px;

    font-size:18px;

}

</style>

</head>

<body>

<div id="background"></div>

<div class="node" id="n1" style="top:20%;left:50%;"></div>
<div class="node" id="n2" style="top:35%;left:75%;"></div>
<div class="node" id="n3" style="top:65%;left:75%;"></div>
<div class="node" id="n4" style="top:80%;left:50%;"></div>
<div class="node" id="n5" style="top:65%;left:25%;"></div>
<div class="node" id="n6" style="top:35%;left:25%;"></div>

<div id="core">

    <img
        id="logo"
        src="https://YOUR_LOGO.png"
    >

</div>

<div id="status">

    Touch to awaken IME

</div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const returnUrl =
    params.get(
        "returnUrl"
    );

const status =
    document.getElementById(
        "status"
    );

for(let i=0;i<120;i++){

    const star =
        document.createElement(
            "div"
        );

    star.className =
        "star";

    star.style.left =
        Math.random()*100+"%";

    star.style.top =
        Math.random()*100+"%";

    star.style.animationDelay =
        Math.random()*5+"s";

    document
        .getElementById(
            "background"
        )
        .appendChild(
            star
        );

}

document
.getElementById(
    "core"
)
.addEventListener(

    "click",

    async ()=>{

        try{

            status.innerHTML =
                "Requesting microphone access...";

            await navigator
                .mediaDevices
                .getUserMedia({

                    audio:true

                });

            await activate(
                "n1",
                "Microphone online"
            );

            await activate(
                "n2",
                "Audio stream online"
            );

            await activate(
                "n3",
                "Backend online"
            );

            await activate(
                "n4",
                "Speech recognition online"
            );

            await activate(
                "n5",
                "Companion online"
            );

            await activate(
                "n6",
                "IME awakened"
            );

            await sleep(
                1500
            );

            if(returnUrl){

                window.location.href =
                    decodeURIComponent(
                        returnUrl
                    );

            }

        }
        catch(error){

            status.innerHTML =
                "Microphone permission denied";

            console.log(
                error
            );

        }

    }

);

async function activate(
    id,
    text
){

    document
        .getElementById(
            id
        )
        .classList
        .add(
            "active"
        );

    status.innerHTML =
        text;

    await sleep(
        600
    );

}

function sleep(ms){

    return new Promise(

        resolve=>
            setTimeout(
                resolve,
                ms
            )

    );

}

</script>

</body>

</html>
