<html>

<head>

<meta charset="UTF-8">

<style>

html,body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#000000;

    display:flex;
    justify-content:center;
    align-items:center;

}

#core{

    position:relative;

    width:260px;
    height:260px;

}

.node{

    position:absolute;

    width:20px;
    height:20px;

    border-radius:50%;

    background:#7dff7d;

    opacity:.15;

    transition:all .5s ease;

}

.node.active{

    opacity:1;

    transform:scale(1.8);

    box-shadow:
        0 0 20px #7dff7d;

}

#center{

    position:absolute;

    left:50%;
    top:50%;

    transform:
        translate(-50%,-50%);

    width:100px;
    height:100px;

    border-radius:50%;

    border:2px solid #7dff7d;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#7dff7d;

    font-family:Arial;

}

</style>

</head>

<body>

<div id="core">

    <div id="center">
        IME
    </div>

    <div class="node" id="node1" style="left:120px;top:0px;"></div>
    <div class="node" id="node2" style="left:220px;top:60px;"></div>
    <div class="node" id="node3" style="left:220px;top:180px;"></div>
    <div class="node" id="node4" style="left:120px;top:240px;"></div>
    <div class="node" id="node5" style="left:0px;top:180px;"></div>
    <div class="node" id="node6" style="left:0px;top:60px;"></div>

</div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const returnUrl =
    params.get(
        "returnUrl"
    );

async function startIME(){

    try{

        const stream =
            await navigator
            .mediaDevices
            .getUserMedia({

                audio:true

            });

        activateNode(
            "node1"
        );

        await delay(500);

        activateNode(
            "node2"
        );

        await delay(500);

        activateNode(
            "node3"
        );

        await delay(500);

        activateNode(
            "node4"
        );

        await delay(500);

        activateNode(
            "node5"
        );

        await delay(500);

        activateNode(
            "node6"
        );

        await delay(1500);

        if(
            returnUrl
        ){

            window.location.href =
                decodeURIComponent(
                    returnUrl
                );

        }

    }
    catch(error){

        console.log(
            error
        );

    }

}

function activateNode(id){

    document
        .getElementById(id)
        .classList
        .add(
            "active"
        );

}

function delay(ms){

    return new Promise(

        resolve=>
            setTimeout(
                resolve,
                ms
            )

    );

}

startIME();

</script>

</body>

</html>
