<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">

<title>IME Awakening</title>

<style>

html,
body{

    margin:0;
    padding:0;

    width:100%;
    height:100%;

    overflow:hidden;

    background:#000000;

    display:flex;
    justify-content:center;
    align-items:center;

    font-family:Arial,sans-serif;

}

#container{

    position:relative;

    width:420px;
    height:420px;

}

#core{

    position:absolute;

    left:50%;
    top:50%;

    transform:
        translate(-50%,-50%);

    width:140px;
    height:140px;

    border-radius:50%;

    border:2px solid #7dff7d;

    box-shadow:
        0 0 20px #7dff7d66,
        0 0 50px #7dff7d22;

    display:flex;
    justify-content:center;
    align-items:center;

    color:#7dff7d;

    cursor:pointer;

    transition:
        all .4s ease;

}

#core:hover{

    transform:
        translate(-50%,-50%)
        scale(1.05);

    box-shadow:
        0 0 40px #7dff7d88,
        0 0 80px #7dff7d33;

}

#logo{

    width:100px;
    height:100px;

    border-radius:50%;

    object-fit:cover;

}

.node{

    position:absolute;

    width:18px;
    height:18px;

    border-radius:50%;

    background:#7dff7d;

    opacity:.15;

    transition:
        all .5s ease;

}

.active{

    opacity:1;

    transform:scale(2);

    box-shadow:
        0 0 20px #7dff7d,
        0 0 50px #7dff7d55;

}

#line1{left:201px;top:20px;}
#line2{left:340px;top:100px;}
#line3{left:340px;top:300px;}
#line4{left:201px;top:380px;}
#line5{left:40px;top:300px;}
#line6{left:40px;top:100px;}

#status{

    position:absolute;

    width:100%;

    bottom:-70px;

    text-align:center;

    color:#7dff7d;

    font-size:18px;

    letter-spacing:3px;

}

@keyframes pulse{

    0%{
        transform:
            translate(-50%,-50%)
            scale(.98);
    }

    50%{
        transform:
            translate(-50%,-50%)
            scale(1.03);
    }

    100%{
        transform:
            translate(-50%,-50%)
            scale(.98);
    }

}

#core{

    animation:
        pulse
        3s
        infinite;

}

</style>

</head>

<body>

<div id="container">

    <div
        id="line1"
        class="node">
    </div>

    <div
        id="line2"
        class="node">
    </div>

    <div
        id="line3"
        class="node">
    </div>

    <div
        id="line4"
        class="node">
    </div>

    <div
        id="line5"
        class="node">
    </div>

    <div
        id="line6"
        class="node">
    </div>

    <div id="core">

        <img
            id="logo"
            src="https://deinedomain.de/ime_logo.png"
        >

    </div>

    <div id="status">

        CLICK TO AWAKEN IME

    </div>

</div>

<script>

const params =
    new URLSearchParams(
        window.location.search
    );

const returnUrl =
    params.get(
        "returnUrl"
    );

const status =
    document.getElementById(
        "status"
    );

document
.getElementById(
    "core"
)
.addEventListener(

    "click",

    async ()=>{

        try{

            status.innerHTML =
                "REQUESTING MICROPHONE";

            const stream =

                await navigator
                .mediaDevices
                .getUserMedia({

                    audio:true

                });

            await activateNode(
                "line1",
                "MIC ONLINE"
            );

            await activateNode(
                "line2",
                "STREAM ONLINE"
            );

            await activateNode(
                "line3",
                "BACKEND ONLINE"
            );

            await activateNode(
                "line4",
                "STT ONLINE"
            );

            await activateNode(
                "line5",
                "VOICE ONLINE"
            );

            await activateNode(
                "line6",
                "IME ONLINE"
            );

            await delay(
                1500
            );

            if(
                returnUrl
            ){

                window.location.href =
                    decodeURIComponent(
                        returnUrl
                    );

            }

        }
        catch(error){

            status.innerHTML =
                "MICROPHONE ACCESS DENIED";

            console.log(
                error
            );

        }

    }

);

async function activateNode(
    id,
    text
){

    document
    .getElementById(
        id
    )
    .classList
    .add(
        "active"
    );

    status.innerHTML =
        text;

    await delay(
        500
    );

}

function delay(ms){

    return new Promise(

        resolve=>
            setTimeout(
                resolve,
                ms
            )

    );

}

</script>

</body>

</html>
